<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIEREVA — Mycelial Electronic Downtempo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #090909; /* Un nero ancora più profondo */
    --dark2: #0e0e0e;
    --blue: #1A4A8A;
    --accent: #3a7bd5;
    --offwhite: #f5f2ed; /* Un po' più luminoso */
    --mid: #999999;
    --light: #dddddd;
    --dim: #333333;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--dark);
    color: var(--offwhite);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 16px; /* Leggermente più grande per leggibilità */
    line-height: 1.8;
    letter-spacing: 0.2px;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 48px;
    background: rgba(9,9,9,0.9);
    backdrop-filter: blur(15px); /* Più immersivo */
    border-bottom: 1px solid rgba(58,123,213,0.1);
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 5px;
    color: var(--offwhite);
    text-decoration: none;
    transition: color 0.3s;
  }
  .nav-logo:hover { color: var(--accent); }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    color: var(--mid);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.3s ease;
  }

  .nav-links a:hover { color: var(--accent); letter-spacing: 3px; }

  /* ── HERO ── */
  #home {
    position: relative;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 6% 10vh; /* Responsive padding */
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('img/cieli_26_cover.jpg');
    background-size: cover;
    background-position: center;
    filter: brightness(0.3) saturate(0.7); /* Effetto più drammatico */
    z-index: 0;
    transform: scale(1.05);
    transition: transform 10s ease-out; /* Zoom lento all'apertura */
  }

  .hero-content {
    position: relative;
    z-index: 1;
    max-width: 800px;
    animation: hero-fade-in 1.5s ease;
  }

  @keyframes hero-fade-in {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-label {
    font-size: 12px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(90px, 15vw, 180px);
    line-height: 0.85;
    letter-spacing: 8px;
    color: var(--offwhite);
    margin-bottom: 16px;
    text-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .hero-sub {
    font-size: 15px;
    letter-spacing: 1.5px;
    color: var(--light);
    margin-bottom: 8px;
  }

  .hero-tagline {
    font-size: 13px;
    letter-spacing: 2.5px;
    color: var(--mid);
    margin-bottom: 40px;
  }

  .hero-bio {
    font-size: 15px;
    line-height: 1.9;
    color: var(--light);
    max-width: 600px;
    margin-bottom: 48px;
    border-left: 2px solid var(--blue);
    padding-left: 24px;
    background: rgba(0,0,0,0.3); /* Leggero background per leggibilità */
    padding: 20px 24px;
  }

  .social-links {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-block;
    padding: 12px 28px;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    border: 1px solid var(--blue);
    color: var(--offwhite);
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
  }

    color: white
