<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIEREVA — Mycelial Electronic Downtempo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #0d0d0d;
    --dark2: #111111;
    --blue: #1A4A8A;
    --accent: #3a7bd5;
    --offwhite: #f0ede8;
    --mid: #888888;
    --light: #cccccc;
    --dim: #444444;
    --container-width: 1100px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--dark);
    color: var(--offwhite);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 15px;
    line-height: 1.7;
  }

  /* ── LAYOUT CORE (L'allineamento richiesto) ── */
  .container {
    max-width: var(--container-width);
    margin: 0 auto;
    padding: 0 48px;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 48px; /* Menu più largo del contenuto */
    background: rgba(13,13,13,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(58,123,213,0.15);
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--offwhite);
    text-decoration: none;
  }

  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a {
    color: var(--mid);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--accent); }

  /* ── HERO ── */
  #home {
    position: relative;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding-bottom: 10vh;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('img/cieli_26_cover.jpg');
    background-size: cover;
    background-position: center;
    filter: brightness(0.35);
    z-index: 0;
  }

  .hero-content {
