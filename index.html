<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIEREVA — Mycelial Electronic Downtempo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #0d0d0d;
    --dark2: #111111;
    --blue: #1A4A8A;
    --accent: #3a7bd5;
    --offwhite: #f0ede8;
    --mid: #888888;
    --light: #cccccc;
    --dim: #444444;
    --grid-max: 1100px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--dark);
    color: var(--offwhite);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 15px;
    line-height: 1.7;
  }

  /* ── GRID SYSTEM ── */
  .grid-container {
    max-width: var(--grid-max);
    margin: 0 auto;
    padding: 0 48px;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 48px;
    background: rgba(13,13,13,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(58,123,213,0.15);
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--offwhite);
    text-decoration: none;
  }

  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a {
    color: var(--mid);
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--accent); }

  /* ── HERO ── */
  #home {
    position: relative;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding-bottom: 10vh;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('img/cieli_26_cover.jpg');
    background-size: cover;
    background-position: center;
    filter: brightness(0.35);
    z-index: 0;
  }

  .hero-content { position: relative; z-index: 1; }

  .hero-label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 14vw, 160px);
    line-height: 0.9;
    letter-spacing: 6px;
    color: var(--offwhite);
    margin-bottom: 12px;
  }

  .hero-sub { font-size: 14px; letter-spacing: 1px; color: var(--light); margin-bottom: 8px; }
  .hero-tagline { font-size: 12px; letter-spacing: 2px; color: var(--mid); margin-bottom: 40px; }

  .hero-bio {
    font-size: 14px;
    line-height: 1.8;
    color: var(--light);
    max-width: 560px;
    margin-bottom: 40px;
    border-left: 2px solid var(--blue);
    padding-left: 20px;
  }

  .btn {
    display: inline-block;
    padding: 10px 24px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    border: 1px solid var(--blue);
    color: var(--offwhite);
    transition: all 0.3s;
    margin-right: 12px;
  }

  .btn.filled { background: var(--blue); color: white; }

  /* ── SECTIONS ── */
  section { padding: 100px 0; }
  
  .section-label {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .section-rule {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, var(--blue), transparent);
    margin-bottom: 48px
